<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolproof</title>
    <style>
        /* Reset defaults and set up the dark background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Smooth font rendering */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Container for the text */
        .holding-message {
            text-align: center;
            padding: 20px;
            /* Premium serif font stack */
            font-family: Garamond, Baskerville, "Baskerville Old Face", "Hoefler Text", "Times New Roman", serif;
            /* Scale font size based on screen width, with min/max safety limits */
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 400;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>

    <h1 class="holding-message">
        Toolproof: fabrication underway.
    </h1>

</body>
</html>
