<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolproof</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Manrope:wght@200..800&display=swap" rel="stylesheet">

    <style>
        /* Reset defaults and set up the dark background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-colour: #143C4A;
            --secondary-colour: #6B1F2A;
        }

        body, html {
            height: 100%;
            background-color: #EFEFE9;
            color: var(--primary-colour);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Smooth font rendering */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-family: "Manrope", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        p {
            margin-bottom: 1em;
        }

        .strong {
            font-weight: 700;
        }
        
        .primary-colour {
            color: var(--primary-colour);
        }
        .secondary-colour {
            color: var(--secondary-colour);
        }


        /* Container for the text */
        .holding-message {
            text-align: center;
            padding: 20px;
        }
        h1.holding-message {
            font-family: "Cal Sans", sans-serif;
            font-style: normal;
            font-size: clamp(2rem, 5vw, 6rem);
            font-weight: 400;
            line-height: 1.3;
        }
    </style>

        <span class="primary-colour">Tool</span><span class="secondary-colour">proof</span>™
    </h1>
    <p class="strong">Make your marketing <span class="secondary-colour">accountable</span>.</p>
    <p>Coming soon.</p>
